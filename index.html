        header, footer {
            padding: 10px;

            text-align: center;
            position: relative;

        header img {
            position: absolute;

            height: auto;

        .date-time {

        .nav-button {

        }
        .nav-button:hover {
            background-color: #45a049;
        }
        #toggle-theme, #toggle-sound {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 14px;
            background: #222;
            color: #ffd700;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            cursor: pointer;
            z-index: 120;
            transition: background 0.2s, color 0.2s;
        }
        #toggle-sound {
            right: 120px; /* Position to the left of the theme button */
            background: #e74c3c;
            color: white;
        }
        #toggle-sound.on {
            background: #2ecc71;
        }
        #toggle-theme.light {
            background: #e0e0e0;
            color: #333;
        }
        /* Dark Mode Styles */
        body.dark-mode {
            background-color: #121212;
            color: #f4f4f4;
        }
        body.dark-mode header,
        body.dark-mode footer {
            background-color: #191919;
            color: #eee;
        }
        body.dark-mode .change-item {
            border-bottom: 1px solid #444;
            background-color: #181818;
        }
        body.dark-mode select,
        body.dark-mode .nav-button {
            background-color: #222;
            color: #f4f4f4;
        }
        body.dark-mode a {
            color: #6cf;
        }

<body>

        <button id="toggle-sound" aria-label="Toggle Sound">🔇 Sound Off</button>
        <h1>Wikipedia Recent Changes</h1>
        <p>Created by <a href="https://meta.wikimedia.org/wiki/User:Suyash.dwivedi" target="_blank">Suyash Dwivedi</a> (in 43 languages)</p>

    <div id="date-time" class="date-time"></div>
    <div id="counter">Changes Count: 0</div>

    <footer>
        Created by <a href="https://meta.wikimedia.org/wiki/User:Suyash.dwivedi" target="_blank">Suyash Dwivedi</a> | Updated on: 08 May 2026
    👁 Views: <span id="tc-views"></span>

    <audio id="beepHi">
        <source src="https://suyashdwivedi.github.io/RC/Recent_changes_hi.mp3" type="audio/mp3">

    <audio id="beepGu">
        <source src="https://suyashdwivedi.github.io/RC/પાનાઓમાં_ફેરફાર_થયો_છે_1.mp3" type="audio/mp3">
    </audio>

    <audio id="beepPa">
        <source src="https://suyashdwivedi.github.io/RC/ਪੰਨਿਆਂ_ਵਿੱਚ_ਬਦਲਾਅ_ਆਇਆ_ਹੈ_2.mp3" type="audio/mp3">
    </audio>

    <div class="nav-buttons">
        <button class="nav-button" onclick="goToTop()">Go to Top</button>
        <button class="nav-button" onclick="goToBottom()">Go to Bottom</button>
    </div>

    <script>
        const changesDiv = document.getElementById('changes');
        const dateDisplay = document.getElementById('date-time');
        const languageSelect = document.getElementById('language-select');
        let lastChangeTimestamp = null;
        let changeCount = 0;
        let isSoundEnabled = true;

        const beepMap = {
            hi: 'beepHi',
            en: 'beepEn',
            gu: 'beepGu',
            pa: 'beepPa'
        };

        function displayDateTime() {
            const now = new Date();
            dateDisplay.innerHTML = `Date: ${now.toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                hour12: true,
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            })}`;
        }

        async function fetchChanges(language) {
            try {
                const res = await fetch(`https://${language}.wikipedia.org/w/api.php?action=query&list=recentchanges&rcprop=title|user|timestamp|comment&rclimit=50&origin=*&format=json`);
                const data = await res.json();
                updateDisplay(data.query.recentchanges, language);
            } catch (err) {
                changesDiv.innerHTML = "<p style='color:red;'>Unable to fetch changes. Please try again later.</p>";
            }
        }

        function updateDisplay(changes, language) {
            const changesDiv = document.getElementById('changes');
            const currentItems = changesDiv.children;
            const beep = document.getElementById(beepMap[language] || 'beepEn');
            changes.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)); // Newest first

            changes.forEach((change, index) => {
                let changeItem;
                if (currentItems[index]) {
                    // Update existing item
                    changeItem = currentItems[index];
                } else {
                    // Create new item if needed
                    changeItem = document.createElement('div');
                    changeItem.className = 'change-item';
                    changesDiv.appendChild(changeItem);
                }
                
                const changeTime = new Date(change.timestamp);
                changeItem.innerHTML = `
                    <strong>Page Changed:</strong> <a href="https://${language}.wikipedia.org/w/index.php?title=${encodeURIComponent(change.title)}&action=history" target="_blank">${change.title}</a><br>
                    <strong>Editor:</strong> <a href="https://${language}.wikipedia.org/wiki/Special:Contributions/${encodeURIComponent(change.user)}" target="_blank">${change.user || 'Anonymous'}</a><br>
                    <strong>Time (UTC):</strong> ${changeTime.toUTCString()}<br>
                    <strong>Time (IST):</strong> ${changeTime.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}<br>
                    <strong>Comment:</strong> ${change.comment || 'No summary'}<br>
                `;

                if (isSoundEnabled && (!lastChangeTimestamp || changeTime > lastChangeTimestamp)) {
                    changeCount++;
                    lastChangeTimestamp = changeTime;
                    beep.play().catch(()=>{});
                }
            });

            // Remove any extra items if the new list is shorter
            while (changesDiv.children.length > changes.length) {
                changesDiv.removeChild(changesDiv.lastChild);
            }

            document.getElementById('counter').innerText = `Changes Count: ${changeCount}`;
        }

        function goToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function goToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Dark mode toggle
        const themeBtn = document.getElementById('toggle-theme');
        function setTheme(mode) {
            if (mode === 'dark') {
                document.body.classList.add('dark-mode');
                themeBtn.textContent = '☀️ Light Mode';
                themeBtn.classList.remove('light');
            } else {
                document.body.classList.remove('dark-mode');
                themeBtn.textContent = '🌙 Dark Mode';
                themeBtn.classList.add('light');
            }
            localStorage.setItem('theme', mode);
        }
        themeBtn.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            setTheme(isDark ? 'dark' : 'light');
        });
        
        // Sound toggle
        const soundBtn = document.getElementById('toggle-sound');
        function setSound(enabled) {
            isSoundEnabled = enabled;
            soundBtn.textContent = enabled ? '🔊 Sound On' : '🔇 Sound Off';
            soundBtn.classList.toggle('on', enabled);
            localStorage.setItem('soundEnabled', enabled);
        }
        soundBtn.addEventListener('click', () => {
            setSound(!isSoundEnabled);
        });

        // Unlock audio on user interaction (browser autoplay rule)
        document.body.addEventListener('click', () => {
            ['beepHi','beepEn','beepGu','beepPa'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.play().then(()=>el.pause()).catch(()=>{});
            });
        }, { once:true });

        // Load preferences on page load
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                setTheme('dark');
            } else {
                setTheme('light');
            }

            const savedSound = localStorage.getItem('soundEnabled');
            if (savedSound !== null) {
                setSound(savedSound === 'true');
            } else {
                setSound(true); // Default to sound on
            }
        };

        displayDateTime();
        setInterval(displayDateTime, 1000);

        const savedLang = localStorage.getItem('selectedLanguage') || 'hi';
        languageSelect.value = savedLang;
        fetchChanges(savedLang);
        setInterval(() => fetchChanges(languageSelect.value), 5000);

        languageSelect.addEventListener('change', () => {
            localStorage.setItem('selectedLanguage', languageSelect.value);
            fetchChanges(languageSelect.value);
            lastChangeTimestamp = null;
            changeCount = 0;
            document.getElementById('counter').innerText = `Changes Count: 0`;
        });
    </script>
